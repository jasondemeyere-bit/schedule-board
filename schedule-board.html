<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Resource Scheduling Board</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .container { display: flex; }\n        .resource-list { width: 200px; border-right: 1px solid #ccc; padding: 10px; }\n        .timeline { flex: 1; overflow-x: auto; border-bottom: 1px solid #ccc; position: relative; }\n        .appointment { background: #4CAF50; color: white; display: inline-block; margin: 5px; padding: 5px; cursor: move; }\n        .time-slot { display: inline-block; width: 100px; height: 100px; border: 1px solid #ccc; position: relative; }\n        .sidebar { position: fixed; left: 10px; top: 10px; }\n    </style>\n</head>\n<body>\n    <div class='sidebar'>\n        <h3>Appointment Requests</h3>\n        <div class='appointment' draggable='true'>Request 1</div>\n        <div class='appointment' draggable='true'>Request 2</div>\n    </div>\n    <div class='container'>\n        <div class='resource-list'>\n            <h3>Resources</h3>\n            <ul>\n                <li>Staff 1</li>\n                <li>Room 101</li>\n                <li>Projector A</li>\n            </ul>\n        </div>\n        <div class='timeline' ondrop='drop(event)' ondragover='allowDrop(event)'>\n            <h3>Hourly Timeline</h3>\n            <div class='time-slot' ondrop='drop(event)' ondragover='allowDrop(event)'>9:00 AM</div>\n            <div class='time-slot' ondrop='drop(event)' ondragover='allowDrop(event)'>10:00 AM</div>\n            <div class='time-slot' ondrop='drop(event)' ondragover='allowDrop(event)'>11:00 AM</div>\n            <div class='time-slot' ondrop='drop(event)' ondragover='allowDrop(event)'>12:00 PM</div>\n        </div>\n    </div>\n    <script>\n        function allowDrop(event) {\n            event.preventDefault();\n        }\n        function drop(event) {\n            event.preventDefault();\n            const data = event.dataTransfer.getData('text');\n            const appointment = document.querySelector(`.appointment[data-id='${data}']`);\n            event.target.appendChild(appointment);\n            // Save to localStorage here for persistence\n        }\n        document.querySelectorAll('.appointment').forEach(app => {\n            app.addEventListener('dragstart', (event) => {\n                event.dataTransfer.setData('text', app.dataset.id);\n            });\n        });\n    </script>\n</body>\n</html>\n

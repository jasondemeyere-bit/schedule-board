<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Scheduling Board</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { display: flex; }
        .resource-list { width: 200px; margin-right: 20px; }
        .timeline { flex-grow: 1; }
        .hour-slot { height: 50px; border: 1px solid #ccc; position: relative; }
        .appointment { position: absolute; background-color: #4CAF50; color: white; padding: 5px; border-radius: 3px; }
        .draggable { cursor: move; }
        .stats { margin-top: 20px; }
        /* Add more styles as needed */
    </style>
</head>
<body>
    <div class="container">
        <div class="resource-list">
            <h3>Appointment Requests</h3>
            <form id="appointment-form">
                <input type="text" placeholder="Request Name" required />
                <input type="number" placeholder="Duration (mins)" required />
                <button type="submit">Add Request</button>
            </form>
            <h3>Resources</h3>
            <ul>
                <li>Room A</li>
                <li>Room B</li>
                <li>Conference Room</li>
                <li>Meeting Hall</li>
            </ul>
            <div class="navigation">
                <button id="prev-day">Previous Day</button>
                <button id="next-day">Next Day</button>
                <button id="today">Today</button>
            </div>
        </div>
        <div class="timeline">
            <h3>Timeline</h3>
            <div id="timeline"> 
                <!-- Dynamically create time slots here -->
            </div>
        </div>
    </div>
    <div class="stats">
        <h3>Statistics</h3>
        <p>Pending Appointments: <span id="pending-count">0</span></p>
        <p>Scheduled Appointments: <span id="scheduled-count">0</span></p>
    </div>
    <script>
        // Code for drag-and-drop, localStorage, conflict detection, and more
        // Functionality to be implemented
        document.getElementById('appointment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Logic to add appointment, handle local storage, and update counts
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Board</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        #board { display: flex; }
        .view { flex: 1; margin: 10px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        h2 { text-align: center; }
        .task { padding: 10px; margin: 5px; background: #f0f0f0; border: 1px solid #ddd; cursor: grab; }
        .task.dragging { opacity: 0.5; }
        input, select, button { margin: 5px; }
    </style>
</head>
<body>
    <h1>Planning Board</h1>
    <div id="board">
        <div class="view" id="day-view"><h2>Day View</h2></div>
        <div class="view" id="week-view"><h2>Week View</h2></div>
        <div class="view" id="month-view"><h2>Month View</h2></div>
    </div>
    <div>
        <input type="text" id="task-title" placeholder="Task Title">
        <select id="task-category">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
        </select>
        <input type="number" id="task-priority" min="1" max="5" placeholder="Priority">
        <button id="add-task">Add Task</button>
    </div>
    <script>
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        const dayView = document.getElementById('day-view');
        const weekView = document.getElementById('week-view');
        const monthView = document.getElementById('month-view');

        function renderTasks() {
            dayView.innerHTML = '<h2>Day View</h2>' + tasks.map(task => 
                `<div class="task" draggable="true" data-title="${task.title}" data-category="${task.category}" data-priority="${task.priority}">${task.title} - ${task.category} (Priority ${task.priority})</div>`
            ).join('');
            attachDragEvents();
        }

        document.getElementById('add-task').addEventListener('click', () => {
            const title = document.getElementById('task-title').value;
            const category = document.getElementById('task-category').value;
            const priority = document.getElementById('task-priority').value;

            if (title) {
                tasks.push({ title, category, priority });
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
                document.getElementById('task-title').value = '';
            }
        });

        function attachDragEvents() {
            const taskElements = document.querySelectorAll('.task');
            taskElements.forEach(task => {
                task.addEventListener('dragstart', () => {
                    task.classList.add('dragging');
                });
                task.addEventListener('dragend', () => {
                    task.classList.remove('dragging');
                });
                task.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const draggingTask = document.querySelector('.dragging');
                    if (task !== draggingTask) {
                        task.parentNode.insertBefore(draggingTask, task);
                    }
                });
            });
        }

        renderTasks();
    </script>
</body>
</html>
